<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ABC Toys</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body onload="getLocation()">

<div class="container" style="margin-top:40px;">

<h2>Your Current Location</h2>

<p id="location">Getting your location...</p>

<div id="map" style="height:400px; width:100%;"></div>

</div>
<script>
  function getLocation() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(showPosition, showError);
    }
    else {
      document.getElementById("location").innerHTML = "Geolocation is not supported by this browser.";
    }
  }

  function showPosition(position) {
    let lat = position.coords.latitude;
    let lon = position.coords.longitude;
    document.getElementById("location").innerHTML = "Latitude: " + lat + "<br>Longitude: " + lon;
    document.getElementById("map").innerHTML = '<iframe width="100%" height="400" ' +
    'src="https://maps.google.com/maps?q=' + lat + ',' + lon + '&z=15&output=embed">' +
    '</iframe>';
  }

  function showError(error) {
    document.getElementById("location").innerHTML = "Location access denied or unavailable.";
  }
</script>
</body>

</html>
